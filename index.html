<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Glow Accesorios</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar fixed-top">
                <div class="container-fluid">
                    <div>
                        <img src="./assets/img/glow-logo.png" class="logo" alt="glow-accesorios-logo">
                        <a class="navbar-brand p-0 btn-navbar" href="./index.html">Inicio</a>
                        <a class="navbar-brand p-0 btn-navbar" href="./tienda.html">Tienda</a>
                        <a class="navbar-brand p-0 btn-navbar" href="./mis-ordenes.html">Mis órdenes</a>
                        <a class="navbar-brand p-0 btn-navbar" href="#contacto">Contacto</a>
                    </div>
                    <button class="navbar-toggler border-0" id="boton-carrito-sidebar" type="button"
                        data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                        aria-label="Toggle navigation">
                        <svg xmlns="http://w3.org" width="30" height="30" fill="currentColor" class="bi bi-cart2 text-white"
                            viewBox="0 0 16 16">
                            <path
                                d="M0 2.5A.5.5 0 0 1 .5 2H2a.5.5 0 0 1 .485.379L2.89 4H14.5a.5.5 0 0 1 .485.621l-1.5 6A.5.5 0 0 1 13 11H4a.5.5 0 0 1-.485-.379L1.61 3H.5a.5.5 0 0 1-.5-.5M3.14 5l1.25 5h8.22l1.25-5zM5 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0m9-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m-2 1a2 2 0 1 1 4 0 2 2 0 0 1-4 0" />
                        </svg>
                    </button>
                    <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                        aria-labelledby="offcanvasDarkNavbarLabel">
                        <div class="offcanvas-header">
                            <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Mi Carrito</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                                aria-label="Close"></button>
                        </div>
                        <div class="offcanvas-body" id="carrito-offcanvas">
                            <div id="carrito-lleno-sidebar" class="">
                                <ul class="navbar-nav pe-3 producto-carrito" id="producto-carrito-sidebar"></ul>
                                <div id="carrito-total-sidebar"></div>
                            </div>
                            <div id="carrito-vacio-sidebar"></div>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <div class="container-fluid p-0">
                <img src="./assets/img/banner.png" class="img-fluid" alt="glow-accesorios-banner">
            </div>
            <div class="container inicio-container">
                <h1 class="">Nuestras Categorías</h1>
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-3" id="card-categorias"></div>
            </div>
        </main>
        <footer>
            <div class="container" id="contacto">
                <div class="logo-container">
                    <img src="./assets/img/glow-logo.png" class="logo" alt="glow-accesorios-logo">
                </div>
                <ul class="nav justify-content-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./tienda.html">Tienda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./mis-ordenes">Mis órdenes</a>
                    </li>
                </ul>
                <div class="contacto-info">
                    <h5>Contacto:</h5>
                    <p>glowaccesorios@gmail.com</p>
                </div>
            </div>
        </footer>
        <script src="assets/js/inicio.js"></script>
        <script src="assets/js/global.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </body>
</html>
